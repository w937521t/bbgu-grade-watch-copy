name: 北部湾大学成绩监控

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 运行模式
        required: true
        default: watch
        type: choice
        options: [watch, renew, login, watch-reset]
  schedule:
    - cron: '7 10-22 * * *'
      timezone: Asia/Shanghai
    - cron: '37 1-23/2 * * *'
      timezone: Asia/Shanghai

permissions:
  contents: write

concurrency:
  group: bbgu-login-state
  cancel-in-progress: false

jobs:
  bbgu:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BBGU_DATA_DIR: ${{ github.workspace }}/bbgu-data
      BBGU_LOGIN_WAIT_SECONDS: '300'
    steps:
      - name: 检出程序
        uses: actions/checkout@v4

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: 安装Node.js依赖
        run: npm ci

      - name: 安装Chromium
        run: npx playwright install --with-deps chromium

      - name: 恢复加密状态
        env:
          BBGU_STATE_PASSWORD: ${{ secrets.BBGU_STATE_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "$BBGU_DATA_DIR"
          git fetch origin '+refs/heads/state:refs/remotes/origin/state' || true
          if git cat-file -e 'refs/remotes/origin/state:bbgu-state.enc' 2>/dev/null; then
            git show 'refs/remotes/origin/state:bbgu-state.enc' > "$RUNNER_TEMP/bbgu-state.enc"
            node scripts/state-crypto.js decrypt "$RUNNER_TEMP/bbgu-state.enc" "$RUNNER_TEMP/bbgu-state.tar.gz"
            tar -xzf "$RUNNER_TEMP/bbgu-state.tar.gz" -C "$BBGU_DATA_DIR"
            echo '[BBGU] 已恢复加密登录状态。'
          else
            echo '[BBGU] 未发现state分支，首次运行请选择login。'
          fi

      - name: 启动并验证Mihomo代理
        env:
          CLASH_SUBSCRIPTION_URL: ${{ secrets.CLASH_SUBSCRIPTION_URL }}
          BBGU_PROXY_FILTER: ${{ secrets.BBGU_PROXY_FILTER }}
          BBGU_PROXY_EXCLUDE: ${{ secrets.BBGU_PROXY_EXCLUDE }}
        run: |
          set -euo pipefail
          if [[ -z "${CLASH_SUBSCRIPTION_URL:-}" ]]; then
            echo '[BBGU] 缺少CLASH_SUBSCRIPTION_URL Secret。' >&2
            exit 1
          fi

          mihomo_dir="$RUNNER_TEMP/bbgu-mihomo"
          mkdir -p "$mihomo_dir/providers"
          mihomo_controller="http://127.0.0.1:9090"
          mihomo_provider="$mihomo_controller/providers/proxies/airport"
          proxy_group="BBGU-STICKY"
          proxy_state_path="$BBGU_DATA_DIR/bbgu_proxy_state.json"
          subscription_json="$(node -e 'process.stdout.write(JSON.stringify(process.env.CLASH_SUBSCRIPTION_URL))')"
          proxy_filter="${BBGU_PROXY_FILTER:-(?i)(^CN-|中国|国内|上海|深圳|浙江|内蒙古|云南|山东|河南|成都|广东)}"
          proxy_user_exclude="${BBGU_PROXY_EXCLUDE:-(?i)(HK|香港|TW|台湾|JP|日本|US|美国|Netflix)}"
          proxy_noise_exclude="(?i)(剩余|流量|到期|官网|套餐)"
          proxy_exclude="$proxy_noise_exclude|$proxy_user_exclude"
          echo "[BBGU] Mihomo节点过滤：filter=$proxy_filter"
          echo "[BBGU] Mihomo节点排除：exclude=$proxy_exclude"
          cat > "$mihomo_dir/config.yaml" <<EOF
          mixed-port: 7890
          allow-lan: false
          bind-address: 127.0.0.1
          mode: rule
          log-level: info
          ipv6: false
          external-controller: 127.0.0.1:9090
          proxy-providers:
            airport:
              type: http
              url: $subscription_json
              path: ./providers/airport.yaml
              interval: 3600
              filter: "$proxy_filter"
              exclude-filter: "$proxy_exclude"
              health-check:
                enable: true
                url: https://zhjw.bbgu.edu.cn/workspace/home
                interval: 300
                timeout: 10000
                lazy: false
          proxy-groups:
            - name: BBGU-STICKY
              type: select
              use: [airport]
          rules:
            - MATCH,BBGU-STICKY
          EOF

          docker pull docker.io/metacubex/mihomo:Alpha
          docker run -d --name bbgu-mihomo --network host \
            -v "$mihomo_dir:/root/.config/mihomo" \
            docker.io/metacubex/mihomo:Alpha >/dev/null

          for attempt in {1..12}; do
            if curl -fsS "$mihomo_controller/proxies/$proxy_group" >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "12" ]]; then
              echo '[BBGU] Mihomo控制接口不可用。' >&2
              exit 1
            fi
            echo "[BBGU] 等待Mihomo控制接口（$attempt/12）..."
            sleep 5
          done

          candidates=""
          for attempt in {1..6}; do
            if provider_json="$(curl -fsS "$mihomo_provider" 2>/dev/null)"; then
              candidates="$(printf '%s' "$provider_json" | node -e 'let text = ""; process.stdin.on("data", (chunk) => { text += chunk; }); process.stdin.on("end", () => { const data = JSON.parse(text); const specialNames = new Set(["COMPATIBLE", "DIRECT", "REJECT", "PASS", "GLOBAL", "BBGU-STICKY"]); const names = Array.isArray(data.proxies) ? data.proxies.map((proxy) => proxy.name) : []; for (const name of names) if (typeof name === "string" && name && !specialNames.has(name)) console.log(name); });')"
            fi
            if [[ -n "$candidates" ]]; then
              break
            fi
            if [[ "$attempt" == "6" ]]; then
              echo '[BBGU] 机场订阅没有返回符合过滤条件的真实节点。' >&2
              exit 1
            fi
            echo "[BBGU] 等待机场订阅节点加载（$attempt/6）..."
            sleep 5
          done

          set_group_proxy() {
            local name="$1"
            local body
            body="$(node -e 'process.stdout.write(JSON.stringify({name: process.argv[1]}))' "$name")"
            curl -fsS -X PUT "$mihomo_controller/proxies/$proxy_group" \
              -H 'Content-Type: application/json' \
              --data "$body" >/dev/null
          }

          test_bbgu_proxy() {
            curl -f -L --proxy http://127.0.0.1:7890 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/145 Safari/537.36' \
              --connect-timeout 5 --max-time 10 -o /dev/null -sS \
              -w 'HTTP=%{http_code} CONNECT=%{time_connect}s TLS=%{time_appconnect}s TOTAL=%{time_total}s' \
              https://zhjw.bbgu.edu.cn/workspace/home
          }

          save_sticky_proxy() {
            local name="$1"
            mkdir -p "$BBGU_DATA_DIR"
            node -e 'const fs = require("fs"); fs.writeFileSync(process.argv[1], `${JSON.stringify({ selectedProxy: process.argv[2], updatedAt: new Date().toISOString() }, null, 2)}\n`);' "$proxy_state_path" "$name"
            echo "[BBGU] 保存粘性节点：$name"
          }

          saved_proxy=""
          if [[ -f "$proxy_state_path" ]]; then
            saved_proxy="$(node -e 'try { const state = require(process.argv[1]); process.stdout.write(String(state.selectedProxy || "")); } catch {}' "$proxy_state_path")"
          fi

          if [[ -n "$saved_proxy" ]]; then
            echo "[BBGU] 沿用上次可用节点：$saved_proxy"
            if grep -Fxq "$saved_proxy" <<< "$candidates"; then
              if set_group_proxy "$saved_proxy" && result="$(test_bbgu_proxy 2>/dev/null)"; then
                echo "[BBGU] Mihomo粘性节点可用：$saved_proxy $result"
                exit 0
              fi
              echo "[BBGU] 上次粘性节点网络不可用，准备切换国内候选节点：$saved_proxy"
            else
              echo "[BBGU] 上次粘性节点已不在当前国内节点列表，准备切换：$saved_proxy"
            fi
          fi

          while IFS= read -r candidate; do
            [[ -z "$candidate" ]] && continue
            [[ "$candidate" == "$saved_proxy" ]] && continue
            echo "[BBGU] 测试候选节点：$candidate"
            if set_group_proxy "$candidate" && result="$(test_bbgu_proxy 2>/dev/null)"; then
              save_sticky_proxy "$candidate"
              echo "[BBGU] Mihomo代理可用：$candidate $result"
              exit 0
            fi
          done <<< "$candidates"

          echo '[BBGU] 所有候选代理节点均无法访问教务系统。' >&2
          exit 1

      - name: 执行BBGU任务
        id: run_bbgu
        continue-on-error: true
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BBGU_TERM: ${{ vars.BBGU_TERM }}
          NODE_USE_ENV_PROXY: '1'
          HTTP_PROXY: http://127.0.0.1:7890
          HTTPS_PROXY: http://127.0.0.1:7890
          BBGU_PROXY_SERVER: http://127.0.0.1:7890
          NO_PROXY: 127.0.0.1,localhost,github.com,api.github.com,www.pushplus.plus
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            mode='${{ inputs.mode }}'
          elif [[ "${{ github.event.schedule }}" == '37 1-23/2 * * *' ]]; then
            mode='renew'
          else
            mode='watch'
          fi

          case "$mode" in
            renew) node bbgu_grade_watch.js renew ;;
            login) node bbgu_grade_watch.js login ;;
            watch-reset)
              rm -f "$BBGU_DATA_DIR/bbgu_grade_snapshot.json"
              echo '[BBGU] 已清空成绩快照，本次watch会把现有成绩视为新增。'
              node bbgu_grade_watch.js
              ;;
            watch) node bbgu_grade_watch.js ;;
            *) echo "未知模式：$mode" >&2; exit 2 ;;
          esac

      - name: 上传登录诊断
        if: steps.run_bbgu.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: bbgu-login-diagnostics-${{ github.run_id }}
          path: ${{ env.BBGU_DATA_DIR }}/bbgu_diagnostics/
          if-no-files-found: ignore
          retention-days: 1

      - name: 加密并保存状态
        if: always()
        env:
          BBGU_STATE_PASSWORD: ${{ secrets.BBGU_STATE_PASSWORD }}
        run: |
          set -euo pipefail
          names=(
            bbgu_token.env
            bbgu_storage_state.json
            bbgu_grade_snapshot.json
            bbgu_qr_reminder_state.json
            bbgu_proxy_state.json
          )
          files=()
          for name in "${names[@]}"; do
            [[ -f "$BBGU_DATA_DIR/$name" ]] && files+=("$name")
          done

          if [[ ${#files[@]} -eq 0 ]]; then
            echo '[BBGU] 没有可保存的状态文件。'
            exit 0
          fi

          tar -czf "$RUNNER_TEMP/bbgu-state.tar.gz" -C "$BBGU_DATA_DIR" "${files[@]}"
          node scripts/state-crypto.js encrypt "$RUNNER_TEMP/bbgu-state.tar.gz" "$RUNNER_TEMP/bbgu-state.enc"

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin '+refs/heads/state:refs/remotes/origin/state' || true
          state_worktree="$RUNNER_TEMP/bbgu-state-branch"
          trap 'git worktree remove --force "$state_worktree" >/dev/null 2>&1 || true' EXIT

          if git show-ref --verify --quiet refs/remotes/origin/state; then
            git worktree add -b state-update "$state_worktree" origin/state
          else
            git worktree add --detach "$state_worktree" HEAD
            git -C "$state_worktree" switch --orphan state-update
            git -C "$state_worktree" rm -rf --ignore-unmatch .
          fi

          cp "$RUNNER_TEMP/bbgu-state.enc" "$state_worktree/bbgu-state.enc"
          git -C "$state_worktree" add bbgu-state.enc
          git -C "$state_worktree" commit -m 'chore: update encrypted BBGU state'
          git -C "$state_worktree" push origin HEAD:state

      - name: Mihomo诊断日志
        if: steps.run_bbgu.outcome == 'failure'
        run: docker logs --tail 100 bbgu-mihomo 2>&1 || true

      - name: 停止Mihomo
        if: always()
        run: docker rm -f bbgu-mihomo >/dev/null 2>&1 || true

      - name: 恢复任务失败结果
        if: steps.run_bbgu.outcome == 'failure'
        run: exit 1
